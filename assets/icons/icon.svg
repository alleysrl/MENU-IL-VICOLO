<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#3a2612"/>
      <stop offset="55%" stop-color="#20160f"/>
      <stop offset="100%" stop-color="#130f0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ff6a1a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ff6a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff3d1f"/>
      <stop offset="45%" stop-color="#ff7a1e"/>
      <stop offset="100%" stop-color="#ffc23a"/>
    </linearGradient>
    <linearGradient id="flameIn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffb43a"/>
      <stop offset="100%" stop-color="#fff2c0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8dc92"/>
      <stop offset="100%" stop-color="#dd9f26"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- fiamma -->
  <path d="M256 88 C 292 148 322 182 322 226 C 322 264 293 294 256 294 C 219 294 190 264 190 226 C 190 182 220 148 256 88 Z" fill="url(#flame)"/>
  <path d="M256 146 C 278 184 296 206 296 228 C 296 252 278 270 256 270 C 234 270 216 252 216 228 C 216 206 234 184 256 146 Z" fill="url(#flameIn)"/>

  <!-- ornamento -->
  <g fill="url(#gold)" opacity=".9">
    <rect x="160" y="330" width="74" height="2.4" rx="1.2"/>
    <rect x="278" y="330" width="74" height="2.4" rx="1.2"/>
    <circle cx="256" cy="331.2" r="3.6"/>
  </g>

  <!-- scritta -->
  <text x="256" y="392" text-anchor="middle" fill="url(#gold)"
        font-family="'Bodoni 72','Playfair Display',Didot,Georgia,serif"
        font-size="56" font-weight="700" letter-spacing="2">IL VICOLO</text>
</svg>
